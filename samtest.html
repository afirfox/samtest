<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专业条码识别器 Pro</title>
    <!-- 引入 html5-qrcode 库 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
            margin: 0 0 8px 0;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
        }

        #reader {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #reader video {
            border-radius: 12px;
        }

        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 180px;
            border: 2px solid rgba(0, 200, 83, 0.8);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 10;
        }

        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00c853, transparent);
            box-shadow: 0 0 8px #00c853;
            animation: scan 2s linear infinite;
            pointer-events: none;
            z-index: 11;
        }

        @keyframes scan {
            0%, 100% { transform: translate(-50%, -90px); }
            50% { transform: translate(-50%, 90px); }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
            justify-content: center;
        }

        button {
            padding: 10px 18px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,122,255,0.3);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        button.secondary {
            background-color: #5856D6;
        }

        button.danger {
            background-color: #FF3B30;
        }

        button.success {
            background-color: #34C759;
        }

        button.warning {
            background-color: #FF9500;
        }

        #result {
            margin-top: 16px;
            padding: 16px;
            width: 100%;
            background: linear-gradient(135deg, #e7f3ff 0%, #f0e7ff 100%);
            border-left: 4px solid #2196F3;
            border-radius: 8px;
            word-break: break-all;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #result strong {
            display: block;
            color: #2196F3;
            margin-bottom: 8px;
        }

        #scanned-text {
            display: block;
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #333;
        }

        .result-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .result-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            color: #666;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            background: #f5f5f7;
        }

        .status.error {
            color: #FF3B30;
            background: #ffe5e3;
        }

        .status.success {
            color: #34C759;
            background: #e8f8ed;
        }

        .status.warning {
            color: #FF9500;
            background: #fff4e5;
        }

        .history {
            margin-top: 20px;
            max-height: 240px;
            overflow-y: auto;
        }

        .history-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-title h3 {
            margin: 0;
            font-size: 16px;
            color: #333;
        }

        .history-item {
            background: #f5f5f7;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .history-item:hover {
            background: #e8e8ed;
        }

        .history-item .content {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Courier New', monospace;
        }

        .history-item .time {
            font-size: 11px;
            color: #999;
            white-space: nowrap;
        }

        .empty-history {
            text-align: center;
            color: #999;
            font-size: 13px;
            padding: 20px;
        }

        .format-tag {
            display: inline-block;
            background: #007AFF;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .icon {
            width: 16px;
            height: 16px;
            display: inline-block;
            vertical-align: middle;
        }

        /* 隐藏的文件输入 */
        #file-input {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📷 专业条码识别器 Pro</h2>
        <div class="subtitle">支持二维码、条形码等多种格式识别</div>

        <div class="controls">
            <button id="start-btn">📷 开启摄像头</button>
            <button id="stop-btn" class="danger" style="display:none;">⏹ 关闭</button>
            <button id="switch-btn" style="display:none;">🔄 切换镜头</button>
            <button id="flash-btn" style="display:none;">💡 闪光灯</button>
            <button id="upload-btn" class="secondary">🖼 相册识别</button>
            <button id="clear-history-btn" class="warning">🗑 清空记录</button>
        </div>

        <!-- 扫描区域 -->
        <div id="reader">
            <div class="scan-frame" id="scan-frame" style="display:none;"></div>
            <div class="scan-line" id="scan-line" style="display:none;"></div>
        </div>

        <!-- 结果显示区域 -->
        <div id="result">
            <span class="format-tag" id="format-tag">CODE</span>
            <strong>✅ 识别结果</strong>
            <span id="scanned-text"></span>
            <div class="result-actions">
                <button class="success" id="copy-btn">📋 复制</button>
                <button id="open-btn">🔗 打开链接</button>
                <button class="secondary" id="rescan-btn">🔄 重新扫描</button>
            </div>
        </div>

        <div class="status" id="status-msg">请点击按钮开启摄像头或上传图片</div>

        <!-- 历史记录 -->
        <div class="history" id="history-section" style="display:none;">
            <div class="history-title">
                <h3>📜 扫描历史</h3>
            </div>
            <div id="history-list"></div>
        </div>

        <!-- 隐藏的文件输入 -->
        <input type="file" id="file-input" accept="image/*">
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 提示音 -->
    <audio id="scan-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU" type="audio/wav">
    </audio>

    <script>
        // ==================== DOM 元素 ====================
        const resultDiv = document.getElementById('result');
        const scannedTextSpan = document.getElementById('scanned-text');
        const formatTag = document.getElementById('format-tag');
        const statusMsg = document.getElementById('status-msg');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const switchBtn = document.getElementById('switch-btn');
        const flashBtn = document.getElementById('flash-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const clearHistoryBtn = document.getElementById('clear-history-btn');
        const copyBtn = document.getElementById('copy-btn');
        const openBtn = document.getElementById('open-btn');
        const rescanBtn = document.getElementById('rescan-btn');
        const fileInput = document.getElementById('file-input');
        const scanFrame = document.getElementById('scan-frame');
        const scanLine = document.getElementById('scan-line');
        const historySection = document.getElementById('history-section');
        const historyList = document.getElementById('history-list');
        const toast = document.getElementById('toast');
        const scanSound = document.getElementById('scan-sound');

        // ==================== 状态管理 ====================
        const html5QrCode = new Html5Qrcode("reader");
        let currentStream = null;
        let currentCameraId = null;
        let availableCameras = [];
        let currentFacingMode = 'environment';
        let isFlashOn = false;
        let isScanning = false;
        let scanCooldown = false;
        const HISTORY_KEY = 'barcode_history';
        const MAX_HISTORY = 50;

        const config = {
            fps: 10,
            qrbox: { width: 250, height: 180 },
            aspectRatio: 1.0
        };

        // ==================== 工具函数 ====================
        function showToast(msg, duration = 2000) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function setStatus(msg, type = '') {
            statusMsg.textContent = msg;
            statusMsg.className = 'status' + (type ? ' ' + type : '');
        }

        function playBeep() {
            try {
                // 使用 Web Audio API 生成提示音（避免依赖外部音频文件）
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 1200;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) {
                console.warn('播放提示音失败:', e);
            }
        }

        function isUrl(text) {
            try {
                const url = new URL(text);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch {
                return false;
            }
        }

        function isJson(text) {
            try {
                JSON.parse(text);
                return true;
            } catch {
                return false;
            }
        }

        // ==================== 历史记录 ====================
        function loadHistory() {
            try {
                const data = localStorage.getItem(HISTORY_KEY);
                return data ? JSON.parse(data) : [];
            } catch {
                return [];
            }
        }

        function saveHistory(history) {
            try {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, MAX_HISTORY)));
            } catch (e) {
                console.warn('保存历史记录失败:', e);
            }
        }

        function addToHistory(text, format) {
            const history = loadHistory();
            // 去重
            const filtered = history.filter(item => item.text !== text);
            filtered.unshift({
                text,
                format: format || 'CODE',
                time: Date.now()
            });
            saveHistory(filtered);
            renderHistory();
        }

        function renderHistory() {
            const history = loadHistory();
            if (history.length === 0) {
                historySection.style.display = 'none';
                return;
            }
            historySection.style.display = 'block';
            historyList.innerHTML = history.map((item, idx) => `
                <div class="history-item" data-idx="${idx}">
                    <div class="content" title="${escapeHtml(item.text)}">${escapeHtml(item.text)}</div>
                    <div class="time">${formatTime(item.time)}</div>
                </div>
            `).join('');

            // 绑定点击事件
            historyList.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.idx);
                    const item = history[idx];
                    scannedTextSpan.textContent = item.text;
                    formatTag.textContent = item.format;
                    resultDiv.style.display = 'block';
                    updateOpenButton(item.text);
                    setStatus('从历史记录加载', 'success');
                });
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            const d = new Date(timestamp);
            const pad = n => n.toString().padStart(2, '0');
            return `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function clearHistory() {
            if (loadHistory().length === 0) {
                showToast('暂无历史记录');
                return;
            }
            if (confirm('确定要清空所有历史记录吗？')) {
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
                showToast('已清空历史记录');
            }
        }

        // ==================== 扫描结果处理 ====================
        function updateOpenButton(text) {
            if (isUrl(text)) {
                openBtn.style.display = 'inline-flex';
            } else {
                openBtn.style.display = 'none';
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (scanCooldown) return;
            scanCooldown = true;
            setTimeout(() => scanCooldown = false, 1500);

            console.log('识别结果:', decodedText, decodedResult);

            const format = decodedResult?.result?.format?.formatName || 'CODE';
            formatTag.textContent = format;
            scannedTextSpan.textContent = decodedText;
            resultDiv.style.display = 'block';
            updateOpenButton(decodedText);

            // 反馈
            if (navigator.vibrate) navigator.vibrate(200);
            playBeep();
            setStatus('✅ 扫描成功！', 'success');

            // 保存到历史
            addToHistory(decodedText, format);

            // 自动停止扫描
            stopCamera();
        }

        // ==================== 摄像头控制 ====================
        async function getCameras() {
            try {
                availableCameras = await Html5Qrcode.getCameras();
                return availableCameras.length > 0;
            } catch (e) {
                console.warn('获取摄像头列表失败:', e);
                return false;
            }
        }

        async function startCamera() {
            try {
                setStatus('正在请求摄像头权限...');
                startBtn.disabled = true;

                // 优先使用具体摄像头 ID（支持闪光灯控制）
                const hasCameras = await getCameras();
                let cameraConfig;

                if (hasCameras && availableCameras.length > 0) {
                    // 优先选择后置摄像头
                    const backCamera = availableCameras.find(c =>
                        c.label.toLowerCase().includes('back') ||
                        c.label.toLowerCase().includes('rear') ||
                        c.label.toLowerCase().includes('后')
                    );
                    currentCameraId = (backCamera || availableCameras[0]).id;
                    cameraConfig = { deviceId: { exact: currentCameraId } };
                    currentFacingMode = backCamera ? 'environment' : 'user';
                } else {
                    cameraConfig = { facingMode: currentFacingMode };
                }

                await html5QrCode.start(cameraConfig, config, onScanSuccess);

                isScanning = true;
                setStatus('摄像头已就绪，请对准条码/二维码', 'success');
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-flex';
                switchBtn.style.display = availableCameras.length > 1 ? 'inline-flex' : 'none';
                flashBtn.style.display = 'inline-flex';
                scanFrame.style.display = 'block';
                scanLine.style.display = 'block';

                // 尝试获取媒体流（用于闪光灯控制）
                tryGetStreamForFlash();
            } catch (err) {
                console.error('Camera start error:', err);
                startBtn.disabled = false;
                setStatus('', '');
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    setStatus('❌ 权限被拒绝，请在浏览器设置中开启摄像头权限', 'error');
                } else if (err.name === 'NotFoundError') {
                    setStatus('❌ 未找到可用的摄像头', 'error');
                } else if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                    setStatus('❌ 必须在 HTTPS 环境下才能使用摄像头！', 'error');
                } else {
                    setStatus(`❌ 启动失败: ${err.message || err}`, 'error');
                }
            }
        }

        async function tryGetStreamForFlash() {
            try {
                if (currentCameraId) {
                    currentStream = await navigator.mediaDevices.getUserMedia({
                        video: { deviceId: { exact: currentCameraId } }
                    });
                    isFlashOn = false;
                    flashBtn.textContent = '💡 闪光灯';
                }
            } catch (e) {
                console.warn('无法获取媒体流（闪光灯功能不可用）:', e);
            }
        }

        async function stopCamera() {
            try {
                if (isScanning) {
                    await html5QrCode.stop();
                    html5QrCode.clear();
                }
                if (currentStream) {
                    currentStream.getTracks().forEach(t => t.stop());
                    currentStream = null;
                }
                isScanning = false;
                isFlashOn = false;
                setStatus('摄像头已关闭', '');
                startBtn.style.display = 'inline-flex';
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
                switchBtn.style.display = 'none';
                flashBtn.style.display = 'none';
                flashBtn.textContent = '💡 闪光灯';
                scanFrame.style.display = 'none';
                scanLine.style.display = 'none';
            } catch (err) {
                console.error('Stop error:', err);
            }
        }

        async function switchCamera() {
            if (availableCameras.length < 2) {
                showToast('只有一个可用摄像头');
                return;
            }
            await stopCamera();
            // 切换到另一个摄像头
            const currentIdx = availableCameras.findIndex(c => c.id === currentCameraId);
            const nextIdx = (currentIdx + 1) % availableCameras.length;
            currentCameraId = availableCameras[nextIdx].id;
            currentFacingMode = nextIdx === 0 ? 'environment' : 'user';
            // 重新创建实例（避免 start 冲突）
            setTimeout(() => startCamera(), 300);
        }

        async function toggleFlash() {
            if (!currentStream) {
                showToast('闪光灯不可用');
                return;
            }
            const track = currentStream.getVideoTracks()[0];
            if (!track) return;

            const capabilities = track.getCapabilities?.();
            if (!capabilities || !capabilities.torch) {
                showToast('当前设备不支持闪光灯');
                return;
            }

            try {
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                flashBtn.textContent = isFlashOn ? '🔆 关闭闪光' : '💡 闪光灯';
                flashBtn.classList.toggle('warning', isFlashOn);
            } catch (e) {
                console.error('闪光灯控制失败:', e);
                isFlashOn = false;
                showToast('闪光灯控制失败');
            }
        }

        // ==================== 相册识别 ====================
        async function scanFromFile(file) {
            if (!file) return;
            setStatus('正在识别图片...', '');
            try {
                // 停止摄像头扫描（避免冲突）
                if (isScanning) {
                    await html5QrCode.stop();
                    isScanning = false;
                }
                const result = await html5QrCode.scanFile(file, true);
                const decodedText = result.decodedText;
                const format = result.result?.format?.formatName || 'CODE';

                formatTag.textContent = format;
                scannedTextSpan.textContent = decodedText;
                resultDiv.style.display = 'block';
                updateOpenButton(decodedText);

                if (navigator.vibrate) navigator.vibrate(200);
                playBeep();
                setStatus('✅ 图片识别成功！', 'success');
                addToHistory(decodedText, format);
            } catch (err) {
                console.error('图片识别失败:', err);
                setStatus('❌ 未在图片中识别到条码/二维码', 'error');
            } finally {
                fileInput.value = '';
            }
        }

        // ==================== 事件绑定 ====================
        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
        switchBtn.addEventListener('click', switchCamera);
        flashBtn.addEventListener('click', toggleFlash);
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => scanFromFile(e.target.files[0]));
        clearHistoryBtn.addEventListener('click', clearHistory);

        copyBtn.addEventListener('click', async () => {
            const text = scannedTextSpan.textContent;
            try {
                await navigator.clipboard.writeText(text);
                showToast('✅ 已复制到剪贴板');
            } catch {
                // 降级方案
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    showToast('✅ 已复制到剪贴板');
                } catch {
                    showToast('❌ 复制失败，请手动选择');
                }
                document.body.removeChild(ta);
            }
        });

        openBtn.addEventListener('click', () => {
            const text = scannedTextSpan.textContent;
            if (isUrl(text)) {
                window.open(text, '_blank', 'noopener,noreferrer');
            }
        });

        rescanBtn.addEventListener('click', () => {
            resultDiv.style.display = 'none';
            if (!isScanning) {
                startCamera();
            }
        });

        // ==================== 初始化 ====================
        renderHistory();

        // 初始安全检查
        if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            setStatus('⚠️ 注意：非 HTTPS 环境无法调用摄像头（可使用相册识别）', 'warning');
        }

        // 页面隐藏时自动停止摄像头（节省资源）
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isScanning) {
                stopCamera();
            }
        });
    </script>
</body>
</html>
