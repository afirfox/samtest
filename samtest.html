<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专业条码识别器</title>
    <!-- 引入 html5-qrcode 库 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        h2 { color: #333; margin-bottom: 10px; }

        #reader {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            background: #e7f3ff;
            border-left: 5px solid #2196F3;
            word-break: break-all;
            display: none;
            box-sizing: border-box;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
            text-align: center;
            max-width: 500px;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:disabled {
            background-color: #ccc;
        }
    </style>
</head>
<body>

    <h2>条码/二维码扫描</h2>
    
    <div class="controls">
        <button id="start-btn">开启摄像头</button>
        <button id="stop-btn" style="display:none; background-color:#FF3B30;">关闭</button>
    </div>

    <!-- 扫描区域 -->
    <div id="reader"></div>

    <!-- 结果显示区域 -->
    <div id="result">
        <strong>识别结果:</strong> <span id="scanned-text"></span>
    </div>

    <div class="status" id="status-msg">请点击按钮开启摄像头</div>

    <script>
        const resultDiv = document.getElementById('result');
        const scannedTextSpan = document.getElementById('scanned-text');
        const statusMsg = document.getElementById('status-msg');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');

        // 创建 Html5Qrcode 实例 (底层 API)
        const html5QrCode = new Html5Qrcode("reader");

        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 180 }, // 适合条码的矩形框
            aspectRatio: 1.0 
        };

        // 成功回调
        function onScanSuccess(decodedText, decodedResult) {
            console.log(`Code matched = ${decodedText}`, decodedResult);
            resultDiv.style.display = 'block';
            scannedTextSpan.innerText = decodedText;
            
            if (navigator.vibrate) navigator.vibrate(200);
            statusMsg.innerText = "扫描成功！";

            // 如果你想扫到一个就停止，取消下面这行的注释
            // stopCamera(); 
        }

        async function startCamera() {
            try {
                statusMsg.innerText = "正在请求摄像头权限...";
                startBtn.disabled = true;

                // 核心修改：使用 facingMode: "environment" 强制调用后置摄像头
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess
                );

                statusMsg.innerText = "摄像头已就绪，请对准条码";
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
            } catch (err) {
                console.error("Camera start error:", err);
                statusMsg.style.color = "red";
                if (err instanceof Html5Qrcode// 如果是库定义的错误
                    || err.name === 'NotAllowedError') {
                    statusMsg.innerText = "错误：权限被拒绝，请在浏览器设置中开启摄像头权限。";
                } else if (location.protocol !== 'https:') {
                    statusMsg.innerText = "错误：必须在 HTTPS 环境下才能使用摄像头！";
                } else {
                    statusMsg.innerText = `启动失败: ${err}`;
                }
                startBtn.disabled = false;
            }
        }

        async function stopCamera() {
            try {
                await html5QrCode.stop();
                statusMsg.innerText = "摄像头已关闭";
                startBtn.style.display = 'inline-block';
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
            } catch (err) {
                console.error("Stop error:", err);
            }
        }

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);

        // 初始安全检查
        if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
            statusMsg.innerText = "⚠️ 注意：非 HTTPS 环境无法调用摄像头！";
            statusMsg.style.color = "orange";
        }
    </script>
</body>
</html>
