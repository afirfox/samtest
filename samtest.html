<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专业条码识别器 Pro + 幸运转盘</title>
    <!-- 引入 html5-qrcode 库 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* 通用容器 */
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            position: relative;
            transition: all 0.3s ease;
        }

        h2 {
            color: #333;
            margin: 0 0 8px 0;
            font-size: 24px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
        }

        /* --- 扫描器样式 (原有功能) --- */
        #reader {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        #reader video { border-radius: 12px; }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 180px;
            border: 2px solid rgba(0, 200, 83, 0.8);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 10;
        }

        .scan-line {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 240px; height: 2px;
            background: linear-gradient(90deg, transparent, #00c853, transparent);
            box-shadow: 0 0 8px #00c853;
            animation: scan 2s linear infinite;
            pointer-events: none;
            z-index: 11;
        }

        @keyframes scan {
            0%, 100% { transform: translate(-50%, -90px); }
            50% { transform: translate(-50%, 90px); }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
            justify-content: center;
        }

        button {
            padding: 10px 18px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,122,255,0.3); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button.secondary { background-color: #5856D6; }
        button.danger { background-color: #FF3B30; }
        button.success { background-color: #34C759; }
        button.warning { background-color: #FF9500; }

        #result {
            margin-top: 16px; padding: 16px; width: 100%;
            background: linear-gradient(135deg, #e7f3ff 0%, #f0e7ff 100%);
            border-left: 4px solid #2196F3; border-radius: 8px;
            word-break: break-all; display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #result strong { display: block; color: #2196F3; margin-bottom: 8px; }
        #scanned-text {
            display: block; background: white; padding: 10px; border-radius: 6px;
            margin-bottom: 10px; font-family: 'Courier New', monospace; font-size: 14px; color: #333;
        }

        .result-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .result-actions button { padding: 6px 12px; font-size: 12px; }

        .status {
            margin-top: 12px; font-size: 13px; color: #666; text-align: center;
            padding: 8px; border-radius: 6px; background: #f5f5f7;
        }
        .status.error { color: #FF3B30; background: #ffe5e3; }
        .status.success { color: #34C759; background: #e8f8ed; }

        .history, .gallery-section { margin-top: 20px; }
        .history-title, .gallery-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .history-item {
            background: #f5f5f7; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
            font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px;
        }
        .history-item:hover { background: #e8e8ed; }

        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 8px; max-height: 360px; overflow-y: auto; padding: 4px;
        }
        .gallery-item {
            position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: transform 0.2s; background: #f5f5f7;
        }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* 设置/关于模态框 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal label { display: block; font-size: 13px; color: #555; margin: 12px 0 4px; }
        .modal input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* --- 转盘游戏样式 (新增功能) --- */
        #game-view {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .wheel-wrapper { position: relative; width: 320px; height: 320px; user-select: none; }
        .pointer {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 40px; z-index: 10;
        }
        .pointer::after {
            content: ''; display: block; width: 0; height: 0;
            border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 30px solid #FFD700;
        }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%; position: relative;
            overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            border: 8px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; background: white; border-radius: 50%; z-index: 5;
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: #764ba2; border: 3px solid #FFD700;
        }

        #result-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: white; padding: 30px 60px; border-radius: 20px; text-align: center;
            z-index: 10001; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transition: transform 0.3s; color: #333;
        }
        #result-modal.show { transform: translate(-50%, -50%) scale(1); }

        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 24px;
            font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        #file-input { display: none; }
        .settings-toggle { position: absolute; top: 18px; right: 18px; background: rgba(0,0,0,0.05); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; }

        /* 模式切换按钮 */
        .mode-switch {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            background: #FFD700; color: #333; padding: 12px 24px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- 模式切换按钮 -->
    <button class="mode-switch" id="toggle-mode-btn">🎮 进入游戏模式</button>

    <!-- 扫描器视图 (原有功能) -->
    <div class="container" id="scanner-view">
        <button class="settings-toggle" id="settings-btn">⚙️</button>
        <h2>📷 专业条码识别器 Pro</h2>
        <div class="subtitle">支持二维码、条形码等多种格式识别</div>

        <div class="controls">
            <button id="start-btn">📷 开启摄像头</button>
            <button id="stop-btn" class="danger" style="display:none;">⏹ 关闭</button>
            <button id="switch-btn" style="display:none;">🔄 切换镜头</button>
            <button id="flash-btn" style="display:none;">💡 闪光灯</button>
            <button id="upload-btn" class="secondary">🖼 相册识别</button>
            <button id="clear-history-btn" class="warning">🗑 清空记录</button>
        </div>

        <div id="reader">
            <div class="scan-frame" id="scan-frame" style="display:none;"></div>
            <div class="scan-line" id="scan-line" style="display:none;"></div>
        </div>

        <div id="result">
            <span class="format-tag" id="format-tag" style="background:#007AFF; color:white; padding:2px 8px; border-radius:4px; font-size:11px;">CODE</span>
            <strong>✅ 识别结果</strong>
            <span id="scanned-text"></span>
            <div class="result-actions">
                <button class="success" id="copy-btn">📋 复制</button>
                <button id="open-btn">🔗 打开链接</button>
                <button class="secondary" id="rescan-btn">🔄 重新扫描</button>
                <button class="warning" id="upload-image-btn" style="display:none;">☁️ 上传服务器</button>
            </div>
        </div>

        <div class="status" id="status-msg">请点击按钮开启摄像头或上传图片</div>

        <div class="history" id="history-section" style="display:none;">
            <div class="history-title"><h3>📜 扫描历史</h3></div>
            <div id="history-list"></div>
        </div>

        <div class="gallery-section" id="gallery-section" style="display:none;">
            <div class="gallery-title-row"><h3>🖼 扫描截图</h3> <button class="gallery-clear-btn" id="clear-gallery-btn" style="background:#FF3B30; color:white; border:none; padding:4px 12px; border-radius:6px; cursor:pointer;">清空</button></div>
            <div class="gallery-grid" id="gallery-grid"></div>
        </div>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <!-- 游戏视图 (新增功能) -->
    <div id="game-view">
        <h1 style="color:white; text-align:center;">🎡 幸运大转盘 🎡</h1>
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div id="wheel"></div>
            <div class="wheel-center">GO</div>
        </div>
        <button id="spin-btn" style="padding:15px 40px; font-size:20px; background:#FFD700; border:none; border-radius:50px; cursor:pointer; color:#333; font-weight:bold;">立即抽奖</button>
    </div>

    <!-- 通用模态框 -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>⚙️ 设置</h3>
            <label>GitHub Token</label><input type="password" id="github-token" placeholder="ghp_xxxx">
            <label>仓库 (owner/repo)</label><input type="text" id="github-repo" placeholder="afirfox/samtest">
            <label>上传目录</label><input type="text" id="github-path" value="images/">
            <div style="margin-top:20px; display:flex; gap:10px; justify-content:flex-end;">
                <button class="secondary" id="settings-cancel">取消</button>
                <button class="success" id="settings-save">保存</button>
            </div>
        </div>
    </div>

    <div id="result-modal">
        <h2>恭喜您！</h2>
        <p id="prize-text" style="font-size:24px; font-weight:bold; margin: 10px 0 20px;"></p>
        <button onclick="document.getElementById('result-modal').classList.remove('show')" style="background:#764ba2; color:white; border:none; padding:8px 20px; border-radius:10px; cursor:pointer;">太棒了!</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ==================== 全局状态 ====================
        let currentMode = 'scanner'; // 'scanner' or 'game'
        const HISTORY_KEY = 'barcode_history';
        const GALLERY_KEY = 'barcode_gallery';

        // DOM Elements - Scanner
        const scannerView = document.getElementById('scanner-view');
        const gameView = document.getElementById('game-view');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const switchBtn = document.getElementById('switch-btn');
        const flashBtn = document.getElementById('flash-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const clearHistoryBtn = document.getElementById('clear-history-btn');
        const resultDiv = document.getElementById('result');
        const scannedTextSpan = document.getElementById('scanned-text');
        const formatTag = document.getElementById('format-tag');
        const statusMsg = document.getElementById('status-msg');
        const copyBtn = document.getElementById('copy-btn');
        const openBtn = document.getElementById('open-btn');
        const rescanBtn = document.getElementById('rescan-btn');
        const fileInput = document.getElementById('file-input');
        const historySection = document.getElementById('history-section');
        const historyList = document.getElementById('history-list');
        const gallerySection = document.getElementById('gallery-section');
        const galleryGrid = document.getElementById('gallery-grid');
        const clearGalleryBtn = document.getElementById('clear-gallery-btn');
        const uploadImageBtn = document.getElementById('upload-image-btn');

        // DOM Elements - Game
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');
        const resultModal = document.getElementById('result-modal');
        const prizeText = document.getElementById('prize-text');

        // ==================== 工具函数 ====================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function setStatus(msg, type = '') {
            statusMsg.textContent = msg;
            statusMsg.className = 'status' + (type ? ' ' + type : '');
        }

        // ==================== 模式切换 ====================
        toggleModeBtn.onclick = () => {
            if (currentMode === 'scanner') {
                scannerView.style.display = 'none';
                gameView.style.display = 'flex';
                toggleModeBtn.textContent = '📷 回到扫描器';
                currentMode = 'game';
            } else {
                scannerView.style.display = 'block';
                gameView.style.display = 'none';
                toggleModeBtn.textContent = '🎮 进入游戏模式';
                currentMode = 'scanner';
            }
        };

        // ==================== 扫描器核心逻辑 ====================
        const html5QrCode = new Html5Qrcode("reader");
        let isScanning = false;

        async function startScanner() {
            try {
                setStatus('正在启动摄像头...', 'success');
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-flex';
                switchBtn.style.display = 'inline-flex';
                flashBtn.style.display = 'inline-flex';
                document.getElementById('scan-frame').style.display = 'block';
                document.getElementById('scan-line').style.display = 'block';

                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 180 } },
                    (decodedText, decodedResult) => {
                        handleScanSuccess(decodedText, decodedResult);
                    }
                );
                isScanning = true;
                setStatus('扫描中... 请将条码对准框内', 'success');
            } catch (err) {
                console.error(err);
                setStatus('启动失败: ' + err, 'error');
                startBtn.style.display = 'inline-flex';
                stopBtn.style.display = 'none';
            }
        }

        async function stopScanner() {
            if (isScanning) {
                await html5QrCode.stop();
                isScanning = false;
                startBtn.style.display = 'inline-flex';
                stopBtn.style.display = 'none';
                switchBtn.style.display = 'none';
                flashBtn.style.display = 'none';
                document.getElementById('scan-frame').style.display = 'none';
                document.getElementById('scan-line').style.display = 'none';
                setStatus('摄像头已关闭');
            }
        }

        function handleScanSuccess(text, result) {
            if (resultDiv.style.display === 'block' && scannedTextSpan.textContent === text) return;

            playBeep();
            scannedTextSpan.textContent = text;
            formatTag.textContent = result.result.format.toUpperCase();
            resultDiv.style.display = 'block';
            
            captureAndSaveImage(text);

            addToHistory(text, formatTag.textContent);
            updateOpenButton(text);
            setStatus('识别成功！', 'success');
        }

        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 1200; gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function updateOpenButton(text) {
            const isUrl = text.startsWith('http://') || text.startsWith('https://');
            openBtn.style.display = isUrl ? 'inline-flex' : 'none';
        }

        function addToHistory(text, format) {
            let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            history = history.filter(i => i.text !== text);
            history.unshift({ text, format, time: Date.now() });
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 50)));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            if (history.length === 0) { historySection.style.display = 'none'; return; }
            historySection.style.display = 'block';
            historyList.innerHTML = history.map((item, idx) => `
                <div class="history-item" onclick="loadHistoryItem(${idx})">
                    <div class="content">${escapeHtml(item.text)}</div>
                    <div class="time">${new Date(item.time).toLocaleTimeString()}</div>
                </div>
            `).join('');
        }

        window.loadHistoryItem = (idx) => {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const item = history[idx];
            scannedTextSpan.textContent = item.text;
            formatTag.textContent = item.format;
            resultDiv.style.display = 'block';
            updateOpenButton(item.text);
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function captureAndSaveImage(text) {
            const video = document.querySelector('#reader video');
            if (!video) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

            let gallery = JSON.parse(localStorage.getItem(GALLERY_KEY) || '[]');
            gallery.unshift({ data: dataUrl, text: text, time: Date.now() });
            localStorage.setItem(GALLERY_KEY, JSON.stringify(gallery.slice(0, 50)));
            renderGallery();
            uploadImageBtn.style.display = 'inline-flex';
        }

        function renderGallery() {
            const gallery = JSON.parse(localStorage.getItem(GALLERY_KEY) || '[]');
            if (gallery.length === 0) { gallerySection.style.display = 'none'; return; }
            gallerySection.style.display = 'block';
            galleryGrid.innerHTML = gallery.map(item => `
                <div class="gallery-item" onclick="viewImage('${item.data}')">
                    <img src="${item.data}">
                </div>
            `).join('');
        }

        window.viewImage = (data) => {
            const win = window.open();
            win.document.write(`<img src="${data}" style="width:100%">`);
        };

        async function uploadToGitHub() {
            const token = localStorage.getItem('gh_token');
            const repo = localStorage.getItem('gh_repo');
            const path = localStorage.getItem('gh_path') || 'images/';
            
            if (!token || !repo) {
                showToast('请先在设置中配置 GitHub Token 和仓库');
                return;
            }

            const gallery = JSON.parse(localStorage.getItem(GALLERY_KEY) || '[]');
            if (gallery.length === 0) return;

            const image = gallery[0]; 
            const base64Data = image.data.split(',')[1];
            const fileName = `${path}${Date.now()}.jpg`;

            try {
                setStatus('正在上传至 GitHub...', 'success');
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'Upload scan screenshot', content: base64Data })
                });

                if (res.ok) {
                    showToast('上传成功！');
                    setStatus('已同步到云端', 'success');
                } else {
                    throw new Error(await res.text());
                }
            } catch (e) {
                console.error(e);
                setStatus('上传失败: ' + e.message, 'error');
            }
        }

        // ==================== 转盘游戏逻辑 ====================
        const prizes = [
            { text: "10元红包", color: "#FF5E5E" },
            { text: "谢谢参与", color: "#FFFFFF" },
            { text: "50元红包", color: "#FFB8B8" },
            { text: "幸运之星", color: "#FFFFFF" },
            { text: "100元大奖", color: "#FFB8B8" },
            { text: "下次努力", color: "#FFFFFF" },
            { text: "精美礼品", color: "#FFD700" },
            { text: "小确幸", color: "#FFFFFF" },
        ];

        let gameRotation = 0;
        function initWheel() {
            const gradientParts = prizes.map((p, i) => {
                const start = (360 / prizes.length) * i;
                const end = (360 / prizes.length) * (i + 1);
                return `${p.color} ${start}deg ${end}deg`;
            }).join(', ');
            wheel.style.background = `conic-gradient(${gradientParts})`;

            prizes.forEach((prize, i) => {
                const angle = (360 / prizes.length) * i + (360 / prizes.length / 2);
                const label = document.createElement('div');
                label.textContent = prize.text;
                label.style.cssText = `position:absolute; left:50%; top:50%; width:140px; height:30px; 
                    transform:translate(-50%, -50%) rotate(${angle}deg) translateY(-120px);
                    text-align:center; font-weight:bold; font-size:14px; color:#333;`;
                wheel.appendChild(label);
            });
        }

        function spinWheel() {
            spinBtn.disabled = true;
            const extraRotation = Math.floor(Math.random() * 360);
            gameRotation += (360 * 5) + extraRotation;
            wheel.style.transform = `rotate(${gameRotation}deg)`;

            setTimeout(() => {
                const actualAngle = gameRotation % 360;
                const sliceAngle = 360 / prizes.length;
                const prizeIndex = Math.floor(((360 - (actualAngle % 360)) % 360) / sliceAngle);
                prizeText.textContent = prizes[prizeIndex].text;
                resultModal.classList.add('show');
                spinBtn.disabled = false;
            }, 4000);
        }

        // ==================== 事件绑定 ====================
        startBtn.onclick = startScanner;
        stopBtn.onclick = stopScanner;
        switchBtn.onclick = async () => {
            await stopScanner();
            showToast('切换镜头已触发 (需设备支持)');
            startScanner();
        };
        flashBtn.onclick = () => showToast('闪光灯状态已切换');
        uploadBtn.onclick = () => fileInput.click();
        clearHistoryBtn.onclick = () => { if(confirm('清空历史？')) { localStorage.removeItem(HISTORY_KEY); renderHistory(); } };
        copyBtn.onclick = () => { navigator.clipboard.writeText(scannedTextSpan.textContent); showToast('已复制'); };
        openBtn.onclick = () => window.open(scannedTextSpan.textContent);
        rescanBtn.onclick = () => { resultDiv.style.display = 'none'; if(!isScanning) startScanner(); };
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setStatus('正在识别图片...', 'success');
            try {
                await html5QrCode.scanFile(file, true)
                    .then(text => handleScanSuccess(text, {result: {format: 'FILE'}}))
                    .catch(err => setStatus('无法识别条码', 'error'));
            } catch (e) { setStatus('错误: ' + e, 'error'); }
        };
        clearGalleryBtn.onclick = () => { localStorage.removeItem(GALLERY_KEY); renderGallery(); };
        uploadImageBtn.onclick = uploadToGitHub;

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-modal').classList.add('show');
        document.getElementById('settings-cancel').onclick = () => document.getElementById('settings-modal').classList.remove('show');
        document.getElementById('settings-save').onclick = () => {
            localStorage.setItem('gh_token', document.getElementById('github-token').value);
            localStorage.setItem('gh_repo', document.getElementById('github-repo').value);
            localStorage.setItem('gh_path', document.getElementById('github-path').value);
            document.getElementById('settings-modal').classList.remove('show');
            showToast('设置已保存');
        };

        spinBtn.onclick = spinWheel;

        initWheel();
        renderHistory();
        renderGallery();
    </script>
</body>
</html>
